# .github/workflows/scrape.yml
name: Daily scrape
on:
  schedule:
    - cron: "0 8 * * *"   # 8am UTC every day
  workflow_dispatch:           # also lets you trigger manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: { python-version: "3.10" }
      - run: pip install scrapy pymongo python-dotenv
      - run: cd scrapy && scrapy crawl hackernews
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}   # stored in GitHub secrets
